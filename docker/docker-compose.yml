services:
  postgres:
    image: postgres:16-alpine
    container_name: snus-sensor-postgres
    environment:
      POSTGRES_DB: snus_sensor_monitoring
      POSTGRES_USER: snus
      POSTGRES_PASSWORD: snus
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
